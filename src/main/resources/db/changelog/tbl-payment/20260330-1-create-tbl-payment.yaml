databaseChangeLog:
  - logicalFilePath: 20260330-1-create-tbl-payment.yaml
  - changeSet:
      id: 20260330-1-create-tbl-payment
      author: nurlanaliyev
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: ticket_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(255)
              - column:
                  name: payment_method
                  type: varchar(255)
              - column:
                  name: payment_status
                  type: varchar(255)
              - column:
                  name: transaction_id
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: confirmed_at
                  type: timestamp
                  constraints:
                    nullable: false